<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Work — Pen and Ink</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  :root{
    --soft:#b9b6b0; --nav-h:88px;
    --sans:'SF Pro Display','Helvetica Neue','Segoe UI',Arial,sans-serif;
    --script:'Great Vibes',cursive;
    --display:'Cormorant Garamond',serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{min-height:100%;background:#0d0d0d;color:#fff;font-family:var(--sans);-webkit-font-smoothing:antialiased}
  a{text-decoration:none;color:inherit}
  img{display:block}

  /* ── CONSTANT TRANSPARENT NAV (shared across all pages) ── */
  .nav{position:fixed;top:0;left:0;right:0;z-index:60;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:transparent;border:none}
  .nav::before{content:"";position:absolute;inset:0;z-index:-1;pointer-events:none;background:linear-gradient(180deg,rgba(0,0,0,.45) 0%,rgba(0,0,0,0) 100%)}
  .brand{display:flex;align-items:center;height:100%}
  .brand img{height:54px;width:auto;display:block;filter:drop-shadow(0 1px 6px rgba(0,0,0,.45))}
  .navright{display:flex;align-items:center}
  .menu{display:flex;gap:2px;list-style:none;white-space:nowrap}
  .menu a{display:block;padding:10px 17px;font-size:15px;color:#fff;font-weight:600;letter-spacing:.02em;border-radius:7px;transition:background .2s;text-shadow:0 1px 10px rgba(0,0,0,.4)}
  .menu a:hover{background:rgba(255,255,255,.16)}
  .menu a.active{background:rgba(255,255,255,.2)}
  .burger{display:none;background:none;border:none;font-size:26px;color:#fff;cursor:pointer}

  /* ── PAGE HERO ── */
  .hero{padding:calc(var(--nav-h) + 70px) 64px 44px}
  .hero h1{font-family:var(--display);font-style:italic;font-weight:300;font-size:clamp(44px,6vw,90px);letter-spacing:.01em;line-height:.9;color:#fff}
  .hero p{margin-top:18px;font-size:15px;color:var(--soft);letter-spacing:.03em;max-width:460px;line-height:1.55}

  /* ── 3 × 3 GRID ── */
  .gallery{
    padding:8px 64px 100px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
    max-width:1280px;
  }
  .gi{position:relative;aspect-ratio:3/2;overflow:hidden;cursor:pointer;background:#1a1a1a;border-radius:4px}
  .gi img{
    width:100%;height:100%;object-fit:cover;
    filter:grayscale(1) contrast(1.02);
    transition:filter .5s ease,transform .6s cubic-bezier(.25,.46,.45,.94);
    will-change:transform,filter;
  }
  /* hover → return to original colour */
  .gi:hover img{filter:grayscale(0);transform:scale(1.045)}
  .gi .gi-label{
    position:absolute;left:0;right:0;bottom:0;padding:26px 16px 13px;
    background:linear-gradient(0deg,rgba(0,0,0,.6) 0%,transparent 100%);
    opacity:0;transition:opacity .3s ease;
  }
  .gi:hover .gi-label{opacity:1}
  .gi .gi-label span{font-family:var(--display);font-style:italic;font-weight:300;font-size:17px;color:#fff;letter-spacing:.02em}

  /* ── LIGHTBOX: enlarge to 75% with blurred backdrop ── */
  .lb{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s ease}
  .lb.open{opacity:1;pointer-events:all}
  .lb-bg{position:absolute;inset:0;background:rgba(8,8,8,.5);
    backdrop-filter:blur(20px) brightness(.55);-webkit-backdrop-filter:blur(20px) brightness(.55)}
  .lb-figure{position:relative;z-index:51;max-width:75vw;max-height:75vh;
    transform:scale(.92);transition:transform .35s cubic-bezier(.25,.46,.45,.94)}
  .lb.open .lb-figure{transform:scale(1)}
  .lb-figure img{max-width:75vw;max-height:75vh;width:auto;height:auto;object-fit:contain;
    box-shadow:0 40px 110px rgba(0,0,0,.6);border-radius:3px}
  .lb-cap{position:absolute;left:0;right:0;bottom:0;padding:34px 28px 20px;
    background:linear-gradient(0deg,rgba(0,0,0,.66) 0%,transparent 100%);pointer-events:none}
  .lb-cap h2{font-family:var(--display);font-style:italic;font-weight:300;font-size:clamp(22px,3vw,42px);color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.4)}
  .lb-cap .meta{margin-top:6px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#cfccc6}
  .lb-close{position:absolute;top:calc(var(--nav-h) + 8px);right:26px;z-index:52;
    background:rgba(0,0,0,.32);border:none;border-radius:50%;width:40px;height:40px;
    font-size:20px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
  .lb-close:hover{background:rgba(0,0,0,.55)}

  @media(max-width:900px){
    .nav{padding:0 22px;height:70px;--nav-h:70px}.menu{display:none}.burger{display:block}
    .hero{padding:calc(70px+44px) 24px 28px}
    .gallery{grid-template-columns:repeat(2,1fr);padding:6px 20px 70px;gap:10px}
    .lb-figure,.lb-figure img{max-width:92vw;max-height:80vh}
  }
  @media(max-width:560px){.gallery{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- CONSTANT TRANSPARENT NAV -->
<nav class="nav">
  <a class="brand" href="index.html">
    <img src="assets/logo-white.png" alt="Pen and Ink — design studio">
  </a>
  <div class="navright">
    <ul class="menu">
      <li><a href="about.html">Our Philosophy</a></li>
      <li><a href="our-work.html" class="active">Our Work</a></li>
      <li><a href="contact.html">Our Studio</a></li>
    </ul>
    <button class="burger">&#9776;</button>
  </div>
</nav>

<!-- PAGE HERO -->
<section class="hero">
  <h1>Our Work</h1>
  <p>A selected portfolio across architecture, interiors, and urbanism — spaces drawn from lived experience and built with precision.</p>
</section>

<!-- 3 × 3 GALLERY -->
<section class="gallery" id="gallery"></section>

<!-- LIGHTBOX -->
<div class="lb" id="lb" role="dialog" aria-modal="true">
  <div class="lb-bg" id="lb-bg"></div>
  <button class="lb-close" id="lb-close" aria-label="Close">&#x2715;</button>
  <figure class="lb-figure">
    <img id="lb-img" src="" alt="">
    <figcaption class="lb-cap">
      <h2 id="lb-name"></h2>
      <div class="meta" id="lb-meta"></div>
    </figcaption>
  </figure>
</div>

<script>
const projects = [
  { name:"Bespoke Residence",  type:"Architecture", city:"Chennai",     year:"2023" },
  { name:"Studio Loft",        type:"Interiors",    city:"Bengaluru",   year:"2022" },
  { name:"The Terraced House", type:"Architecture", city:"Mumbai",      year:"2024" },
  { name:"Garden Pavilion",    type:"Urbanism",     city:"Coimbatore",  year:"2023" },
  { name:"The Atelier",        type:"Interiors",    city:"Chennai",     year:"2022" },
  { name:"Coastal Retreat",    type:"Architecture", city:"Pondicherry", year:"2023" },
  { name:"The Urban Loft",     type:"Interiors",    city:"Bengaluru",   year:"2024" },
  { name:"Heritage Villa",     type:"Architecture", city:"Chennai",     year:"2021" },
  { name:"The Skyhouse",       type:"Architecture", city:"Mumbai",      year:"2023" },
];

const imgSrc = i => `assets/gallery/g${String(i+1).padStart(2,'0')}.jpg`;

// build the 3×3 grid
const gal = document.getElementById('gallery');
projects.forEach((p, idx) => {
  const d = document.createElement('div');
  d.className = 'gi';
  d.innerHTML = `<img src="${imgSrc(idx)}" alt="${p.name}" loading="lazy">
    <div class="gi-label"><span>${p.name}</span></div>`;
  d.addEventListener('click', () => openLb(idx));
  gal.appendChild(d);
});

// lightbox
const lb     = document.getElementById('lb');
const lbImg  = document.getElementById('lb-img');
const lbName = document.getElementById('lb-name');
const lbMeta = document.getElementById('lb-meta');

function openLb(idx){
  const p = projects[idx];
  lbImg.src = imgSrc(idx);
  lbImg.alt = p.name;
  lbName.textContent = p.name;
  lbMeta.textContent = p.type + ' · ' + p.city + ' · ' + p.year;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb(){
  lb.classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('lb-close').addEventListener('click', closeLb);
document.getElementById('lb-bg').addEventListener('click', closeLb);
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLb(); });
</script>
</body>
</html>
